services:
  web:
    image: nginx:latest
    container_name: ngix_server
    ports:
      - "8080:80"
    networks: 
      - mynetwork

  redis:
    image: redis:latest
    container_name: redis_server
    networks: 
      - mynetwork

  mysql:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes: 
      - mysql_data:/var/lib/mysql
    networks:
      - mynetwork

volumes:
  mysql_data:

networks:
  mynetwork:




